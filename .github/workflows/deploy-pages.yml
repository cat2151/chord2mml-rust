name: Deploy to GitHub Pages

# Restored from the workflow deleted in #28, now viable because the WASM
# build follows the tonejs-mml-to-json pattern: web-tree-sitter (JS) parses
# in the browser, and the Rust WASM (default features, no tree-sitter C
# dependency) only converts CST JSON to MML.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh -s -- -v 0.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd chord2mml-web
          npm install

      - name: Build WASM
        run: |
          cd chord2mml-web
          npm run build:wasm

      - name: Test WASM path (web-tree-sitter + Rust WASM in Node)
        run: |
          cd chord2mml-web
          npm test

      - name: Build web app
        run: |
          cd chord2mml-web
          VITE_BASE_PATH=/chord2mml-rust/ npm run build:web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./chord2mml-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
